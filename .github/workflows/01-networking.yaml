name: Networking

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/environments/dev/networking/**'
      - 'terraform/modules/networking/**'

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev-networking
  cancel-in-progress: false

env:
  TERRAFORM_VERSION: 1.10.5
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache
  TF_WORKING_DIR: terraform/environments/dev/networking

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP Authentication
        uses: ./.github/actions/gcp-auth

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Create Plugin Cache Dir
        run: mkdir -p /home/runner/.terraform.d/plugin-cache
      
      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: /home/runner/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      
      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate
      
      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint --recursive
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -var-file=dev.tfvars -input=false -lock-timeout=5m -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
  
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan

    if: |
      success() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    environment: development

    defaults:
        run:
          working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
        - uses: actions/checkout@v4

        - name: GCP Authentication
          uses: ./.github/actions/gcp-auth

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: ${{ env.TERRAFORM_VERSION }}

        - name: Create Plugin Cache Dir
          run: mkdir -p /home/runner/.terraform.d/plugin-cache

        - name: Cache Terraform Providers
          uses: actions/cache@v4
          with:
            path: /home/runner/.terraform.d/plugin-cache
            key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}

        - name: Terraform Init
          run: terraform init -input=false

        - name: Download Plan
          uses: actions/download-artifact@v4
          with:
            name: tfplan
            path: ${{ env.TF_WORKING_DIR }}

        - name: Verify Downloaded Plan
          run: |
            pwd
            ls -lah

        - name: Terraform Show Plan
          run: terraform show tfplan

        - name: Terraform Apply
          run: terraform apply -input=false -lock-timeout=5m tfplan