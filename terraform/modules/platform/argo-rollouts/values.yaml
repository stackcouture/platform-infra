installCRDs: true

controller:
  replicas: 2

  nodeSelector:
    workload: system

  tolerations:
    - key: workload
      operator: Equal
      value: system
      effect: NoSchedule

dashboard:
  enabled: true

  nodeSelector:
    workload: system

  tolerations:
    - key: workload
      operator: Equal
      value: system
      effect: NoSchedule

metrics:
  enabled: true